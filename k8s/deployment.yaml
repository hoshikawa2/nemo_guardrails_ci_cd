apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrails-api
  namespace: guardrails
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guardrails-api
  template:
    metadata:
      labels:
        app: guardrails-api
    spec:
      containers:
        - name: guardrails-api
          image: REPLACE_IMAGE_URI
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: guardrails-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
